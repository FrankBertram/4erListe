<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Seite nicht gefunden</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 40px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        .logo {
            flex-shrink: 0;
        }

        .logo img {
            width: 110px;
            height: auto;
        }

        .content h1 {
            margin: 0 0 10px 0;
            font-size: 26px;
            font-weight: 600;
            color: #dc2626;
        }

        .content p {
            margin: 0 0 20px 0;
            color: #475569;
        }

        .link-btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        @media (max-width: 500px) {
            .card {
                flex-direction: column;
                text-align: center;
            }

            .logo img {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="skat.png" alt="Skat Logo">
        </div>
        <div class="content">
            <h1>Diese Seite existiert nicht mehr</h1>
            <p>Die Inhalte wurden verschoben. Du findest alles auf der aktuellen Seite:</p>
            <a class="link-btn" href="https://frankbertram.github.io/Skatliste">
                Sintherner Skatclub - Skatliste
            </a>
        </div>
    </div>
</body>
</html>
